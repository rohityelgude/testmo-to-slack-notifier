name: Notify Latest Testmo Run

on:
  workflow_dispatch:  # Runs only when manually triggered

jobs:
  fetch-latest-run:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch latest Testmo automation run
        run: |
          response=$(curl -s -H "Authorization: Bearer ${{ secrets.TESTMO_API_TOKEN }}" \
            "https://${{ secrets.TESTMO_BASE_URL }}/api/v1/automation-runs?limit=1&sort=created_at:desc")
          echo "$response" > latest_run.json
          latest_id=$(jq -r '.automation_runs[0].id' latest_run.json)
          echo "latest_run_id=$latest_id" >> $GITHUB_OUTPUT

      - name: Print latest run JSON
        run: cat latest_run.json
